<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Accounts AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --accent: #0ea5e9;
            --success: #22c55e;
            --bg-main: #ecfeff;
            --card-bg: rgba(255, 255, 255, 0.94);
            --border-soft: rgba(15, 23, 42, 0.08);
            --shadow-soft: 0 20px 45px rgba(15, 23, 42, 0.14);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --danger: #ef4444;
        }
        body {
            min-height: 100vh;
            margin: 0;
            font-family: "Poppins", system-ui, sans-serif;
            background: linear-gradient(rgb(0 0 0 / 83%), rgb(0 0 0 / 65%)), url(/static/app/images/login-bg.jpg);
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            color: var(--text-main);
        }
        .login-wrapper { width: 100%; max-width: 420px; }
        .brand-small { text-align: center; margin-bottom: 14px; font-size: 13px; color: white; }
        .brand-small span { font-weight: 600; color: var(--primary); }
        .login-card {
            border-radius: 22px;
            background: var(--card-bg);
            border: 1px solid var(--border-soft);
            box-shadow: var(--shadow-soft);
            padding: 26px 24px;
            backdrop-filter: blur(18px);
        }
        .login-header { text-align: center; margin-bottom: 18px; }
        .login-title { font-size: 22px; font-weight: 600; }
        .login-subtitle { font-size: 13px; color: var(--text-muted); }
        .form-label { font-size: 12px; font-weight: 500; color: #334155; }
        .input-group-custom { position: relative; margin-bottom: 12px; }
        .input-icon { position: absolute; top: 50%; left: 12px; transform: translateY(-50%); font-size: 15px; color: #64748b; pointer-events: none; }
        .form-control-custom {
            width: 100%; border-radius: 12px; border: 1px solid rgba(148, 163, 184, 0.45);
            background: #f8fafc; font-size: 13px; padding: 10px 12px 10px 36px; transition: all 0.15s ease;
        }
        .form-control-custom:focus { background: #ffffff; border-color: var(--primary); box-shadow: 0 0 0 1px rgba(37, 99, 235, 0.2); outline: none; }
        .toggle-password { position: absolute; top: 50%; right: 12px; transform: translateY(-50%); font-size: 11px; cursor: pointer; color: #475569; }
        .toggle-password:hover { color: var(--primary); }
        .btn-primary-soft {
            width: 100%; border-radius: 999px; padding: 10px 16px; font-size: 13px; font-weight: 500;
            border: none; background: linear-gradient(135deg, #38bdf8, #22c55e); color: #022c22;
            box-shadow: 0 14px 32px rgba(14, 165, 233, 0.35); transition: all 0.15s ease;
        }
        .btn-primary-soft:hover { transform: translateY(-1px); filter: brightness(1.05); }
        .alert-danger-custom { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; border-radius: 10px; padding: 10px 12px; font-size: 12px; margin-bottom: 14px; }
    </style>
</head>
<body>
<div class="login-wrapper">
    <div class="brand-small">
        Secure access to <span>Accounts AI</span>
    </div>
    <div class="login-card">
        <div class="login-header">
            <div class="login-title">Set New Password</div>
            <div class="login-subtitle">Your new password must be different from previous ones</div>
        </div>

        {% if error %}
        <div class="alert-danger-custom">{{ error }}</div>
        {% endif %}

        <form method="POST" action="{{ request.scope.get('root_path', '') }}/reset-password">
            <input type="hidden" name="token" value="{{ token }}">

            <div class="mb-3">
                <label class="form-label">New Password</label>
                <div class="input-group-custom">
                    <span class="input-icon">🔒</span>
                    <input type="password" name="password" class="form-control-custom" placeholder="••••••••" minlength="6" required>
                    <span class="toggle-password" onclick="toggle(this)">Show</span>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Confirm Password</label>
                <div class="input-group-custom">
                    <span class="input-icon">🔒</span>
                    <input type="password" name="password_confirm" class="form-control-custom" placeholder="••••••••" required>
                    <span class="toggle-password" onclick="toggle(this)">Show</span>
                </div>
            </div>

            <button type="submit" class="btn-primary-soft">
                Reset Password
            </button>
        </form>

        <p class="text-center mt-3" style="font-size: 12px;">
            <a href="{{ request.scope.get('root_path', '') }}/" style="color: var(--primary); text-decoration: none;">← Back to Sign In</a>
        </p>
    </div>
</div>

<script>
    function toggle(el) {
        const input = el.previousElementSibling;
        if (input.type === "password") {
            input.type = "text";
            el.textContent = "Hide";
        } else {
            input.type = "password";
            el.textContent = "Show";
        }
    }
</script>
</body>
</html>
