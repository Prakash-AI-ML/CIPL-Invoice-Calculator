<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Thai Document Generator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <style>
        body {
            background: linear-gradient(135deg, #1f4037, #99f2c8);
            min-height: 100vh;
        }
        .card-custom {
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .preview-container {
            height: 620px;
            overflow: hidden;
            background: white;
            border-radius: 10px;
            border: 1px solid #ccc;
        }
        .preview-container embed, .preview-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .status-log {
            font-size: 0.9rem;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row">

        <!-- LEFT SIDE: Input -->
        <div class="col-lg-5">
            <div class="card card-custom p-4 h-100">
                <h3 class="text-center mb-4">📄 Thai Document Generator</h3>

                <div class="mb-4">
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="checkbox" id="verification">
                        <label class="form-check-label fw-semibold" for="verification">Verification</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="checkbox" id="fnl_to_ori">
                        <label class="form-check-label fw-semibold" for="fnl_to_ori">FNL → ORI</label>
                    </div>
                </div>

                <form id="thaiForm">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Upload Draft DOCX</label>
                        <input type="file" class="form-control" id="draft_docx" accept=".doc,.docx" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">Upload Excel Sheet</label>
                        <input type="file" class="form-control" id="thai_sheet" accept=".xls,.xlsx" required>
                    </div>

                    <div class="d-grid">
                        <button type="submit" id="generateBtn" class="btn btn-primary btn-lg">
                            Generate Documents
                        </button>
                    </div>
                </form>

                <!-- Processing Status -->
                <div id="processingStatus" class="mt-4 p-3 bg-light rounded status-log" style="display: none; min-height: 120px;">
                    <strong>Processing...</strong><br>
                    <span id="statusText"></span>
                </div>
            </div>
        </div>

        <!-- RIGHT SIDE: Result -->
        <div class="col-lg-7">
            <div class="card card-custom p-4 h-100">
                <h4 class="mb-3">Generated Results</h4>

                <div id="loader" class="text-center py-5" style="display: none;">
                    <div class="spinner-border text-primary mb-3" style="width: 3rem; height: 3rem;"></div>
                    <p id="loaderText" class="fw-semibold mb-1">Starting generation...</p>
                    <p id="loaderSubText" class="text-muted small"></p>
                </div>

                <div id="resultSection" style="display: none;">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5 class="mb-0">Preview (PDF)</h5>
                    </div>

                    <div class="preview-container mb-3" id="previewContainer"></div>

                    <div class="mb-4">
                        <h6>Generated Files:</h6>
                        <div class="list-group" id="fileList">
                            <!-- Populated by JS -->
                        </div>
                    </div>

                    <div class="d-flex gap-2 flex-wrap">
                        <button id="downloadCurrentPdfBtn" class="btn btn-success">⬇ Download PDF</button>
                        <button id="downloadCurrentDocxBtn" class="btn btn-primary">⬇ Download DOCX</button>
                        <!-- <button id="downloadCurrentBothBtn" class="btn btn-info">⬇ Current Both (ZIP)</button> -->
                        <button id="downloadAllBtn" class="btn btn-warning">⬇ Download All (ZIP)</button>
                    </div>
                </div>

                <div id="noResult" class="text-center py-5 text-muted">
                    <p>Upload files and click Generate to see results here.</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
// Shared variables
let zipBlob = null;
let filesData = [];
let currentIndex = 0;

const loader = document.getElementById('loader');
const resultSection = document.getElementById('resultSection');
const previewContainer = document.getElementById('previewContainer');
const fileListEl = document.getElementById('fileList');

// DOM Elements
const prevBtn = document.createElement('button'); // Not using navigation for single file usually
const nextBtn = document.createElement('button');

// Process Form
document.getElementById('thaiForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const draftFile = document.getElementById('draft_docx').files[0];
    const excelFile = document.getElementById('thai_sheet').files[0];

    if (!draftFile || !excelFile) {
        alert("Please upload both Draft DOCX and Excel Sheet");
        return;
    }

    const verification = document.getElementById('verification').checked;
    const fnl_to_ori = document.getElementById('fnl_to_ori').checked;

    // Show loader
    loader.style.display = 'block';
    resultSection.style.display = 'none';
    document.getElementById('noResult').style.display = 'none';

    const loaderText = document.getElementById('loaderText');
    const loaderSubText = document.getElementById('loaderSubText');

    loaderText.textContent = "Processing Thai documents...";
    loaderSubText.textContent = "Generating DOCX and PDF";

    const formData = new FormData();
    formData.append("draft_docx", draftFile);
    formData.append("thai_sheet", excelFile);

    try {
        const response = await fetch(
            `${API_BASE}/v1/thai/generate/docx1?verification=${verification}&fnl_to_ori=${fnl_to_ori}`,
            { method: "POST", body: formData }
        );

        if (!response.ok) throw new Error("Server error: " + response.status);

        zipBlob = await response.blob();
        const zip = await JSZip.loadAsync(zipBlob);

        filesData = [];
        let pdfBlob = null, docxBlob = null;

        for (let fileName in zip.files) {
            const lowerName = fileName.toLowerCase();
            if (lowerName.endsWith('.pdf')) {
                const data = await zip.files[fileName].async("arraybuffer");
                pdfBlob = new Blob([data], { type: "application/pdf" });
            }
            if (lowerName.endsWith('.docx')) {
                docxBlob = await zip.files[fileName].async("blob");
            }
        }

        if (!pdfBlob) throw new Error("PDF not found in response");

        // Prepare filesData (even for single file to keep consistent UI)
        const entry = {
            name: "Thai_Document",
            pdfBlob: pdfBlob,
            pdfUrl: URL.createObjectURL(pdfBlob),
            docxBlob: docxBlob,
            docxUrl: docxBlob ? URL.createObjectURL(docxBlob) : null
        };

        filesData.push(entry);
        currentIndex = 0;

        // Render UI
        renderFileList();
        updatePreview();

        loader.style.display = 'none';
        resultSection.style.display = 'block';

    } catch (err) {
        console.error(err);
        loaderText.textContent = "Error";
        loaderSubText.textContent = err.message;
        loaderSubText.classList.add('text-danger');
    }
});

function updatePreview() {
    if (filesData.length === 0) return;
    const file = filesData[currentIndex];

    previewContainer.innerHTML = `
        <embed src="${file.pdfUrl}" type="application/pdf">
    `;
}

function renderFileList() {
    fileListEl.innerHTML = '';
    filesData.forEach((file, index) => {
        const item = document.createElement('a');
        item.className = `list-group-item list-group-item-action ${index === currentIndex ? 'active' : ''}`;
        item.textContent = file.name;
        item.onclick = () => {
            currentIndex = index;
            renderFileList();
            updatePreview();
        };
        fileListEl.appendChild(item);
    });
}

// Download Handlers
document.getElementById('downloadCurrentPdfBtn').onclick = () => {
    const f = filesData[currentIndex];
    if (!f.pdfUrl) return;
    const a = document.createElement('a');
    a.href = f.pdfUrl;
    a.download = `${f.name}.pdf`;
    a.click();
};

document.getElementById('downloadCurrentDocxBtn').onclick = () => {
    const f = filesData[currentIndex];
    if (!f.docxUrl) return alert("No DOCX available");
    const a = document.createElement('a');
    a.href = f.docxUrl;
    a.download = `${f.name}.docx`;
    a.click();
};


document.getElementById('downloadAllBtn').onclick = () => {
    if (!zipBlob) return;
    const a = document.createElement('a');
    a.href = URL.createObjectURL(zipBlob);
    a.download = "thai_documents.zip";
    a.click();
};
</script>

</body>
</html>
