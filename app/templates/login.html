<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Accounts AI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #2563eb;
            --accent: #0ea5e9;
            --success: #22c55e;
            --bg-main: #ecfeff;
            --card-bg: rgba(255, 255, 255, 0.94);
            --border-soft: rgba(15, 23, 42, 0.08);
            --shadow-soft: 0 20px 45px rgba(15, 23, 42, 0.14);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; }

        body {
    min-height: 100vh;
    margin: 0;
    font-family: "Poppins", system-ui, sans-serif;

    /* Black transparent overlay + image */
    background: linear-gradient(rgb(0 0 0 / 83%), rgb(0 0 0 / 65%)), url(/static/app/images/login-bg.jpg);

    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;

    color: var(--text-main);
}
        .login-wrapper {
            width: 100%;
            max-width: 420px;
        }

        .brand-small {
            text-align: center;
            margin-bottom: 14px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .brand-small span {
            font-weight: 600;
            color: var(--primary);
        }

        .login-card {
            border-radius: 22px;
            background: var(--card-bg);
            border: 1px solid var(--border-soft);
            box-shadow: var(--shadow-soft);
            padding: 26px 24px;
            backdrop-filter: blur(18px);
        }

        .login-header {
            text-align: center;
            margin-bottom: 18px;
        }

        .login-title {
            font-size: 22px;
            font-weight: 600;
        }

        .login-subtitle {
            font-size: 13px;
            color: var(--text-muted);
        }

        .form-label {
            font-size: 12px;
            font-weight: 500;
            color: #334155;
        }

        .input-group-custom {
            position: relative;
            margin-bottom: 12px;
        }

        .input-icon {
            position: absolute;
            top: 50%;
            left: 12px;
            transform: translateY(-50%);
            font-size: 15px;
            color: #64748b;
            pointer-events: none;
        }

        .form-control-custom {
            width: 100%;
            border-radius: 12px;
            border: 1px solid rgba(148, 163, 184, 0.45);
            background: #f8fafc;
            font-size: 13px;
            padding: 10px 12px 10px 36px;
            transition: all 0.15s ease;
        }

        .form-control-custom:focus {
            background: #ffffff;
            border-color: var(--primary);
            box-shadow: 0 0 0 1px rgba(37, 99, 235, 0.2);
            outline: none;
        }

        .form-control-custom.is-invalid {
            border-color: var(--danger);
        }

        .invalid-feedback-custom {
            font-size: 11px;
            color: #b91c1c;
            margin-top: 3px;
        }

        .toggle-password {
            position: absolute;
            top: 50%;
            right: 12px;
            transform: translateY(-50%);
            font-size: 11px;
            cursor: pointer;
            color: #475569;
        }

        .toggle-password:hover {
            color: var(--primary);
        }

        .btn-primary-soft {
            width: 100%;
            border-radius: 999px;
            padding: 10px 16px;
            font-size: 13px;
            font-weight: 500;
            border: none;
            background: linear-gradient(135deg, #38bdf8, #22c55e);
            color: #022c22;
            box-shadow: 0 14px 32px rgba(14, 165, 233, 0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.15s ease;
        }

        .btn-primary-soft:hover:not(:disabled) {
            transform: translateY(-1px);
            filter: brightness(1.05);
        }

        .btn-primary-soft:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .btn-spinner {
            width: 14px;
            height: 14px;
            border: 2px solid rgba(2, 44, 34, 0.4);
            border-top-color: #022c22;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .alert-custom {
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 12px;
            margin-bottom: 14px;
        }

        .alert-danger-custom {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #991b1b;
        }
    </style>
</head>
<body>

<div class="login-wrapper">
    <div class="brand-small" style="color: white;">
        Secure access to <span>Accounts AI</span>
    </div>
    <div class="row">

        <div class="col-md-6"></div>
        <div class="col-md-12">
             <div class="login-card">
        <div class="login-header">
            <div class="login-title">Account Sign In</div>
            <div class="login-subtitle">Manage Payment Aging, Clients Invoices & Reports</div>
        </div>

        {% if error %}
        <div class="alert-custom alert-danger-custom">
            {{ error }}
        </div>
        {% endif %}

        <form id="loginForm" method="POST" action="{{ request.scope.get('root_path', '') }}/login" novalidate>

            <div class="mb-2">
                <label class="form-label">Work Email</label>
                <div class="input-group-custom">
                    <span class="input-icon">💼</span>
                    <input type="email" id="email" name="email"
                           class="form-control-custom"
                           placeholder="accounts@company.com"
                           required>
                </div>
                <div class="invalid-feedback-custom" id="emailError" style="display:none;">
                    Enter a valid work email
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <div class="input-group-custom">
                    <span class="input-icon">🔑</span>
                    <input type="password" id="password" name="password"
                           class="form-control-custom"
                           placeholder="••••••••"
                           minlength="6"
                           required>
                    <span class="toggle-password" id="togglePassword">Show</span>
                </div>
                <div class="invalid-feedback-custom" id="passwordError" style="display:none;">
                    Minimum 6 characters required
                </div>
            </div>

            <button type="submit" class="btn-primary-soft" id="submitBtn">
                <span id="submitText">Sign in securely</span>
                <span id="submitSpinner" class="btn-spinner" style="display:none;"></span>
            </button>
        </form>
        <p class="text-center mt-3" style="font-size: 12px;">
            <a href="{{ request.scope.get('root_path', '') }}/forgot-password" style="color: var(--primary); text-decoration: none;">Forgot Password →</a>
        </p>
    </div>
        </div>


    </div>

   
</div>

<!-- ✅ YOUR ORIGINAL SCRIPT – UNCHANGED -->
<script>
    const ROOT_PATH = "{{ request.scope.get('root_path', '') }}";

    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');

    togglePassword.addEventListener('click', function() {
        const type = passwordInput.type === 'password' ? 'text' : 'password';
        passwordInput.type = type;
        this.textContent = type === 'password' ? 'Show' : 'Hide';
    });

    const loginForm = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const emailError = document.getElementById('emailError');
    const passwordError = document.getElementById('passwordError');
    const submitBtn = document.getElementById('submitBtn');
    const submitText = document.getElementById('submitText');
    const submitSpinner = document.getElementById('submitSpinner');

    function validateEmail(email) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    loginForm.addEventListener('submit', function(e) {
        let isValid = true;

        if (!validateEmail(emailInput.value)) {
            emailInput.classList.add('is-invalid');
            emailError.style.display = 'block';
            isValid = false;
        }

        if (passwordInput.value.length < 1) {
            passwordInput.classList.add('is-invalid');
            passwordError.style.display = 'block';
            isValid = false;
        }

        if (!isValid) {
            e.preventDefault();
            return;
        }

        submitBtn.disabled = true;
        submitText.textContent = 'Signing in...';
        submitSpinner.style.display = 'inline-block';
    });
</script>

</body>
</html>
