<!-- ============================= -->
<!-- PERMISSION MANAGEMENT -->
<!-- ============================= -->

<h4>Permission Management</h4>

<div class="d-flex justify-content-between mb-3">
  <div></div>
  <button class="btn btn-primary" id="addPermissionBtn">
    Add Permission
  </button>
</div>

<div class="table-responsive">
  <table class="table table-bordered table-hover" id="permissionTable">
    <thead class="table-light">
      <tr>
        <th>Permission ID</th>
        <th>Permission Name</th>
        <th style="width: 160px;">Actions</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<div id="permissionLoading" class="text-center py-5 d-none">
  <div class="spinner-border text-primary"></div>
  <p class="mt-2">Loading permissions...</p>
</div>

<div id="permissionError" class="alert alert-danger d-none"></div>

<!-- ============================= -->
<!-- CREATE / EDIT PERMISSION MODAL -->
<!-- ============================= -->

<div class="modal fade" id="permissionModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title" id="permissionModalTitle">Add Permission</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <form id="permissionForm">
          <input type="hidden" id="permissionId" />

          <div class="mb-3">
            <label class="form-label">Permission Name</label>
            <input type="text" class="form-control" id="permissionName" required />
          </div>
        </form>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
          Cancel
        </button>
        <button type="submit" form="permissionForm" class="btn btn-primary">
          Save
        </button>
      </div>

    </div>
  </div>
</div>

<!-- ============================= -->
<!-- DELETE PERMISSION MODAL -->
<!-- ============================= -->

<div class="modal fade" id="deletePermissionModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Delete Permission</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        Are you sure you want to delete this permission?
        <input type="hidden" id="deletePermissionId" />
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">
          Cancel
        </button>
        <button class="btn btn-danger" id="confirmDeletePermission">
          Delete
        </button>
      </div>

    </div>
  </div>
</div>

<script src="/static/app/permission.js"></script>
