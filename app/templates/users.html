<div class=" py-4">
    <h3>User Management</h3>
    <button class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#addUserModal">
        Add User
    </button>

    <div class="table-responsive">
        <table class="table table-bordered table-hover" id="usersTable">
            <thead class="table-light">
                <tr>
                    <!-- <th>Full Name</th> -->
                    <th>Username</th>
                    <th>Email</th>
                    <th>Role</th>
                    <!-- <th>Group ID</th> -->
                    <th>Action</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div id="usersLoading" class="text-center py-5">
        <div class="spinner-border text-primary"></div>
        <p class="mt-2">Loading users...</p>
    </div>
    <div id="usersError" class="alert alert-danger d-none"></div>
</div>



<!-- ADD USER MODAL -->
<div class="modal fade" id="addUserModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Add User</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">

                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" id="newFullName" class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" id="newUsername" class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" id="newEmail" class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label">Role</label>
                    <select id="newRole" class="form-select">
                        {% if request.state.user.role == 'super_admin' %}
                            <option value="admin">Admin</option>
                        {% endif %}

                        {% if request.state.user.role == 'super_admin' or request.state.user.role == 'admin' %}
                            <option value="accountant">Accountant</option>
                            <option value="user">User</option>
                        {% endif %}


                    </select>
                </div>

                <div class="mb-3 hide">
                    <label class="form-label">Group ID</label>
                    <input type="number" id="newGroupId" class="form-control" value="1">
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" id="newPassword" class="form-control">
                </div>

            </div>
            <div class="modal-footer">
                <button class="btn btn-primary" id="saveUserBtn">Save</button>
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            </div>
        </div>
    </div>
</div>



<!-- EDIT USER MODAL -->
<div class="modal fade" id="editUserModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Edit User</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">

                <input type="hidden" id="editUserId">

                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" id="editFullName" class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" id="editUsername" class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" id="editEmail" class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label">Role</label>
                    <select id="editRole" class="form-select">
                         {% if request.state.user.role == 'super_admin' %}
                            <option value="super_admin">Super Admin</option>
                            <option value="admin">Admin</option>
                        {% endif %}

                        {% if request.state.user.role == 'super_admin' or request.state.user.role == 'admin' %}
                            <option value="accountant">Accountant</option>
                            <option value="user">User</option>
                        {% endif %}
                    </select>
                </div>

                <div class="mb-3 hide">
                    <label class="form-label">Group ID</label>
                    <input type="number" id="editGroupId" class="form-control"  value="1">
                </div>

                <div class="mb-3">
                    <label class="form-label">New Password (optional)</label>
                    <input type="password" id="editPassword" class="form-control">
                </div>

            </div>
            <div class="modal-footer">
                <button class="btn btn-primary" id="updateUserBtn">Update</button>
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            </div>
        </div>
    </div>
</div>



<script src="/static/app/users.js"></script>
