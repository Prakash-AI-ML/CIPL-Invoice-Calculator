<style>
  .profile-card {
    display: flex;
    align-items: center;
    background: #e8ecfb;
    border-radius: 14px;
    padding: 24px;
    gap: 32px;
}

.profile-section {
    flex: 1;
}

.section-title {
    display: block;
    font-size: 14px;
    color: #555;
    margin-bottom: 12px;
}

.image-block {
    display: flex;
    align-items: center;
    gap: 18px;
}

.image-wrapper {
    position: relative;
    width: 110px;
    height: 110px;
}

.image-wrapper img {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid #fff;
    box-shadow: 0 6px 14px rgba(0,0,0,0.15);
}

.edit-icon {
    position: absolute;
    bottom: 6px;
    right: 6px;
    width: 28px;
    height: 28px;
    background: #1f3bb3;
    color: #fff;
    border-radius: 50%;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
}

.profile-info h3 {
    margin: 0;
    font-size: 22px;
    font-weight: 600;
}

.profile-info p {
    margin: 4px 0 0;
    color: #333;
}

.divider {
    width: 1px;
    height: 110px;
    background: #c7cce3;
}

</style>
<div class="row">
  <div class="col-md-1"></div>
  
  <div class="col-md-10 mt-2 mt-md-0">
    <div class="card border-0 shadow-lg rounded-3 overflow-hidden"
    style="backdrop-filter: blur(12px); background: rgba(255,255,255,0.92);">
    
    <div class="card-header bg-gradient text-dark py-4"
    style="background: linear-gradient(135deg, #2563eb, #0ea5e9);">
    <h4 class="mb-0 text-center fw-semibold">
      <i class="bi bi-person-circle me-2"></i> Profile Settings
    </h4>
    <p class="mb-0 text-center opacity-90 small mt-1">
      Update your account information
    </p>
  </div>
  
  <div class="card-body p-2 p-md-5">
    
    <!-- Messages -->
    <div id="profileLoading" class="text-center py-5 d-none">
      <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;"></div>
      <p class="mt-3 text-muted">Loading profile...</p>
    </div>
    
    <div id="profileError" class="alert alert-danger d-none"></div>
    <div id="profileSuccess" class="alert alert-success d-none"></div>
    
    <form id="profileForm" novalidate>
      <input type="hidden" id="userId">
      
      <!-- ROW 1 -->
      <div class="row">
        <div class="col-md-4 mb-4">
          <label class="form-label fw-medium text-dark">Username</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-0">
              <i class="bi bi-person"></i>
            </span>
            <input type="text" id="username" class="form-control"
            placeholder="Enter your username" required>
          </div>
          <div class="invalid-feedback">Please enter a username</div>
        </div>
        
        <div class="col-md-4 mb-4">
          <label class="form-label fw-medium text-dark">Email</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-0">
              <i class="bi bi-envelope"></i>
            </span>
            <input type="email" id="email" class="form-control"
            placeholder="your.email@example.com" disabled>
          </div>
          <small class="text-muted">Email cannot be changed</small>
        </div>
        
        <div class="col-md-4 mb-3">
          <label class="form-label fw-medium text-dark">Role</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-0">
              <i class="bi bi-shield-check"></i>
            </span>
            <input type="text" id="roleName" class="form-control"
            placeholder="User role" disabled>
          </div>
        </div>

        <div class="col-md-4 mb-3">
          <label class="form-label fw-medium text-dark">Company</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-0">
              <i class="bi bi-shield-check"></i>
            </span>
            <input type="text" id="companyName" class="form-control"
            placeholder="Company" >
          </div>
        </div>
        <div class="col-md-4 mb-3">
          <label class="form-label fw-medium text-dark">Mobile No</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-0">
              <i class="bi bi-phone"></i>
            </span>
            <input type="number" id="phone" class="form-control"
            placeholder="Enter Mobile No" >
          </div>
        </div>
        
        <div class="col-md-6 "></div>
      </div>
      <div class="row">
        <div class="col-md-12">
          <div class="profile-card">
            <div class="profile-section">
              <span class="section-title">Profile</span>
              
              <div class="image-block">
                <div class="image-wrapper">
                  <img id="edit_profile_image_preview" src="/static/app/images/profiles/default-profile.png" />
                  <label for="edit_profile_image" class="edit-icon">
                    ✎
                  </label>
                </div>
                
             
              </div>
              
              <input type="file" id="edit_profile_image" class="d-none" />
            </div>
            
            <div class="divider"></div>
            
            <div class="profile-section">
              <span class="section-title">Logo</span>
              
              <div class="image-block">
                <div class="image-wrapper">
                  <img id="edit_logo_image_preview" src="/static/app/images/profiles/default-logo.png" />
                  <label for="edit_logo_image" class="edit-icon">
                    ✎
                  </label>
                </div>
              </div>
              
              <input type="file" id="edit_logo_image" class="d-none" />
            </div>
          </div>
        </div>
      </div>
      <hr class="my-3 border-secondary opacity-25">
      
      <h6 class="fw-semibold text-primary mb-4">
        Change Password (Optional)
      </h6>
      
      <!-- ROW 3 -->
      <div class="row">
        <div class="col-md-6 mb-4">
          <label class="form-label fw-medium text-dark">New Password</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-0">
              <i class="bi bi-lock"></i>
            </span>
            <input type="password" id="newPassword" class="form-control"
            placeholder="Enter a new password (optional)">
            <button class="btn btn-outline-secondary toggle-pwd" type="button">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>
        
        <div class="col-md-6 mb-4">
          <label class="form-label fw-medium text-dark">Confirm New Password</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-0">
              <i class="bi bi-lock-fill"></i>
            </span>
            <input type="password" id="confirmPassword" class="form-control"
            placeholder="Repeat your new password">
            <button class="btn btn-outline-secondary toggle-pwd" type="button">
              <i class="bi bi-eye"></i>
            </button>
          </div>
          <div id="passwordError" class="text-danger small mt-2 d-none">
            Passwords do not match or are too weak
          </div>
        </div>
      </div>
      
      <!-- BUTTON -->
      <div class="d-grid mt-5">
        <button type="submit"
        class="btn btn-lg fw-semibold text-white shadow"
        style="background: linear-gradient(135deg, #22c55e, #16a34a);
        border: none; border-radius: 999px; padding: 14px;">
        <span id="saveText">Update Profile</span>
        <span id="saveSpinner"
        class="spinner-border spinner-border-sm ms-2 d-none"></span>
      </button>
    </div>
    
  </form>
</div>
</div>
</div>
</div>
<script src="/static/app/profile.js"></script>
