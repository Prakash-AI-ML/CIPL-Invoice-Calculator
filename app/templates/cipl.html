<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CIPL DOCX Generator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Mammoth JS (only used as fallback if needed) -->
    <script src="https://unpkg.com/mammoth/mammoth.browser.min.js"></script>

    <!-- JSZip - to extract files from ZIP in browser -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <style>
        body {
            background: linear-gradient(135deg, #1f4037, #99f2c8);
            min-height: 100vh;
        }

        .card-custom {
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .preview-container {
            height: 650px;
            overflow: hidden;
            background: white;
            border-radius: 10px;
            border: 1px solid #ccc;
        }

        .preview-container embed,
        .preview-container object {
            width: 100%;
            height: 100%;
            border: none;
        }

        .loader {
            display: none;
        }

        .btn-group-custom .btn {
            min-width: 140px;
        }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-9">

            <div class="card card-custom p-4">

                <h3 class="text-center mb-4">📄 CIPL Document Generator</h3>

                <form id="uploadForm">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Upload Excel (.xls / .xlsx)</label>
                        <input type="file" class="form-control" id="fileInput" accept=".xls,.xlsx" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Divided By</label>
                        <input type="number" step="any" class="form-control" id="dividedByInput">
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">
                            Generate Document
                        </button>
                    </div>
                </form>

                <div class="text-center mt-3 loader" id="loader">
                    <div class="spinner-border text-primary"></div>
                    <p class="mt-2">Generating document... Please wait</p>
                </div>

                <div id="resultSection" class="mt-4" style="display:none;">
                    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
                        <h5 class="mb-0">Preview (PDF)</h5>
                        <div class="btn-group-custom">
                            <button id="downloadPdfBtn" class="btn btn-success">
                                ⬇ PDF
                            </button>
                            <button id="downloadDocxBtn" class="btn btn-primary">
                                ⬇ DOCX
                            </button>
                            <button id="downloadBothBtn" class="btn btn-info">
                                ⬇ Both (ZIP)
                            </button>
                        </div>
                    </div>

                    <div class="preview-container" id="previewContainer">
                        <!-- PDF will be rendered here -->
                    </div>
                </div>

            </div>

        </div>
    </div>
</div>

<script>
    const form = document.getElementById('uploadForm');
    const loader = document.getElementById('loader');
    const resultSection = document.getElementById('resultSection');
    const previewContainer = document.getElementById('previewContainer');
    const downloadPdfBtn  = document.getElementById('downloadPdfBtn');
    const downloadDocxBtn = document.getElementById('downloadDocxBtn');
    const downloadBothBtn = document.getElementById('downloadBothBtn');

    let zipBlob = null;
    let pdfBlob = null;
    let docxBlob = null;
    let pdfUrl = null;
    let docxUrl = null;

    form.addEventListener('submit', async function (e) {
        e.preventDefault();

        const file = document.getElementById('fileInput').files[0];
        const dividedByValue = document.getElementById('dividedByInput').value;

        if (!file) {
            alert("Please select an Excel file");
            return;
        }

        const headers = {
            "Authorization": `Bearer ${localStorage.getItem("token") || getCookie("access_token") || ""}`
        };

        if (dividedByValue && dividedByValue.trim() !== "") {
            headers["divided_by"] = dividedByValue.trim();
        }

        loader.style.display = "block";
        resultSection.style.display = "none";
        previewContainer.innerHTML = "";

        // Clean up previous URLs
        if (pdfUrl) URL.revokeObjectURL(pdfUrl);
        if (docxUrl) URL.revokeObjectURL(docxUrl);

        pdfBlob = docxBlob = zipBlob = null;
        pdfUrl = docxUrl = null;

        const formData = new FormData();
        formData.append("file1", file);   // ← change to your backend's expected field name if different

        try {
            const response = await fetch(`${API_BASE}/v1/cipl/docx`, {   // ← make sure API_BASE is defined
                method: "POST",
                headers: headers,
                body: formData
            });

            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(`Server error ${response.status}: ${errorText}`);
            }

            zipBlob = await response.blob();

            // Extract files from ZIP
            const zip = await JSZip.loadAsync(zipBlob);

            const fileNames = Object.keys(zip.files);

            const docxFileName = fileNames.find(n => n.toLowerCase().endsWith('.docx'));
            const pdfFileName  = fileNames.find(n => n.toLowerCase().endsWith('.pdf'));

            if (!pdfFileName) {
                throw new Error("PDF file not found in the response ZIP");
            }

            // Extract as binary blobs with explicit MIME types
            pdfBlob = await zip.file(pdfFileName).async("blob");
            pdfBlob = new Blob([pdfBlob], { type: "application/pdf" });

            if (docxFileName) {
                docxBlob = await zip.file(docxFileName).async("blob");
                docxBlob = new Blob([docxBlob], {
                    type: "application/vnd.openxmlformats-officedocument.wordprocessingml.document"
                });
            }

            // Create object URLs
            pdfUrl = URL.createObjectURL(pdfBlob);
            if (docxBlob) docxUrl = URL.createObjectURL(docxBlob);

            // Use <embed> for better PDF rendering compatibility
            previewContainer.innerHTML = `
                <embed src="${pdfUrl}" type="application/pdf" width="100%" height="100%">
            `;

            resultSection.style.display = "block";

        } catch (err) {
            console.error("Generation failed:", err);
            previewContainer.innerHTML = `
                <div class="alert alert-danger m-3">
                    ${err.message || "Failed to generate or preview document"}
                </div>
            `;
            resultSection.style.display = "block";
        } finally {
            loader.style.display = "none";
        }
    });

    // Download buttons
    downloadPdfBtn.addEventListener('click', () => {
        if (!pdfBlob || !pdfUrl) return alert("No PDF available");
        const a = document.createElement('a');
        a.href = pdfUrl;
        a.download = "generated_report.pdf";
        a.click();
    });

    downloadDocxBtn.addEventListener('click', () => {
        if (!docxBlob || !docxUrl) return alert("No DOCX available");
        const a = document.createElement('a');
        a.href = docxUrl;
        a.download = "generated_report.docx";
        a.click();
    });

    downloadBothBtn.addEventListener('click', () => {
        if (!zipBlob) return alert("No files available");
        const a = document.createElement('a');
        a.href = URL.createObjectURL(zipBlob);
        a.download = "cipl_documents.zip";
        a.click();
    });

    // Cleanup on page leave
    window.addEventListener('beforeunload', () => {
        if (pdfUrl) URL.revokeObjectURL(pdfUrl);
        if (docxUrl) URL.revokeObjectURL(docxUrl);
    });

    // Simple cookie helper
    function getCookie(name) {
        const value = `; ${document.cookie}`;
        const parts = value.split(`; ${name}=`);
        if (parts.length === 2) return parts.pop().split(';').shift();
        return null;
    }
</script>

</body>
</html>
