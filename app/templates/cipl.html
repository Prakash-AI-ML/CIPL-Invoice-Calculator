<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CIPL DOCX Generator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/mammoth/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <style>
        body {
            background: linear-gradient(135deg, #1f4037, #99f2c8);
            min-height: 100vh;
        }
        .card-custom {
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .preview-container {
            height: 620px;
            overflow: hidden;
            background: white;
            border-radius: 10px;
            border: 1px solid #ccc;
        }
        .preview-container embed {
            width: 100%;
            height: 100%;
            border: none;
        }
        .file-list {
            max-height: 180px;
            overflow-y: auto;
        }
        .file-item {
            cursor: pointer;
        }
        .file-item.active {
            background: #e6f3ff;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-9">

            <div class="card card-custom p-4">

                <h3 class="text-center mb-4">📄 CIPL Document Generator</h3>

                <form id="uploadForm">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Upload Excel Files (.xls / .xlsx)</label>
                        <input type="file" class="form-control" id="fileInput" accept=".xls,.xlsx" multiple required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Divided By</label>
                        <input type="number" step="any" class="form-control" id="dividedByInput">
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">Generate Documents</button>
                    </div>
                </form>

                <div class="text-center mt-3 loader" id="loader" style="display:none;">
                    <div class="spinner-border text-primary"></div>
                    <p class="mt-2">Generating documents... Please wait</p>
                </div>

                <div id="resultSection" class="mt-4" style="display:none;">

                    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
                        <h5 class="mb-0">Preview (PDF)</h5>
                        <div class="btn-group btn-group-sm">
                            <button id="prevBtn" class="btn btn-outline-secondary">← Prev</button>
                            <button id="nextBtn" class="btn btn-outline-secondary">Next →</button>
                        </div>
                    </div>

                    <div class="preview-container mb-3" id="previewContainer">
                        <!-- PDF shown here -->
                    </div>

                    <div class="mb-4">
                        <h6>Generated Files:</h6>
                        <div class="list-group file-list" id="fileList"></div>
                    </div>

                    <div class="d-flex gap-2 flex-wrap">
                        <button id="downloadCurrentPdfBtn" class="btn btn-success">⬇ Current PDF</button>
                        <button id="downloadCurrentDocxBtn" class="btn btn-primary">⬇ Current DOCX</button>
                        <button id="downloadCurrentBothBtn" class="btn btn-info">⬇ Current Both (ZIP)</button>
                        <button id="downloadAllBtn" class="btn btn-warning">⬇ Download All (ZIP)</button>
                    </div>

                </div>

            </div>
        </div>
    </div>
</div>

<script>
    const form = document.getElementById('uploadForm');
    const loader = document.getElementById('loader');
    const resultSection = document.getElementById('resultSection');
    const previewContainer = document.getElementById('previewContainer');
    const fileListEl = document.getElementById('fileList');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const downloadCurrentPdfBtn = document.getElementById('downloadCurrentPdfBtn');
    const downloadCurrentDocxBtn = document.getElementById('downloadCurrentDocxBtn');
    const downloadCurrentBothBtn = document.getElementById('downloadCurrentBothBtn');
    const downloadAllBtn = document.getElementById('downloadAllBtn');

    let zipBlob = null;           // original zip from server
    let filesData = [];           // array of {name, pdfBlob, docxBlob?, pdfUrl, docxUrl?}
    let currentIndex = 0;

    function revokeAllUrls() {
        filesData.forEach(f => {
            if (f.pdfUrl) URL.revokeObjectURL(f.pdfUrl);
            if (f.docxUrl) URL.revokeObjectURL(f.docxUrl);
        });
        filesData = [];
        currentIndex = 0;
    }

    function updatePreview() {
        if (filesData.length === 0) return;

        const file = filesData[currentIndex];
        previewContainer.innerHTML = file.pdfUrl
            ? `<embed src="${file.pdfUrl}" type="application/pdf">`
            : `<div class="alert alert-warning m-3">No PDF available for this file</div>`;

        // Update active item in list
        document.querySelectorAll('.file-item').forEach((el, i) => {
            el.classList.toggle('active', i === currentIndex);
        });

        // Update button states
        prevBtn.disabled = currentIndex === 0;
        nextBtn.disabled = currentIndex === filesData.length - 1;
    }

    function createFileList() {
        fileListEl.innerHTML = '';
        filesData.forEach((file, index) => {
            const item = document.createElement('a');
            item.className = 'list-group-item list-group-item-action file-item';
            item.textContent = file.name || `Document ${index + 1}`;
            item.onclick = () => {
                currentIndex = index;
                updatePreview();
            };
            fileListEl.appendChild(item);
        });
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const files = document.getElementById('fileInput').files;
        if (files.length === 0) return alert("Please select at least one Excel file");

        const dividedBy = document.getElementById('dividedByInput').value.trim();
        const headers = {
            "Authorization": `Bearer ${localStorage.getItem("token") || getCookie("access_token") || ""}`
        };
        if (dividedBy) headers["divided_by"] = dividedBy;

        loader.style.display = 'block';
        resultSection.style.display = 'none';
        previewContainer.innerHTML = '';
        revokeAllUrls();

        const formData = new FormData();
        Array.from(files).forEach((file, i) => formData.append(`file${i+1}`, file));

        try {
            const res = await fetch(`${API_BASE}/v1/cipl/docx`, {
                method: "POST",
                headers,
                body: formData
            });

            if (!res.ok) {
                const err = await res.text();
                throw new Error(`Server error ${res.status}: ${err}`);
            }

            zipBlob = await res.blob();
            const zip = await JSZip.loadAsync(zipBlob);

            const allFileNames = Object.keys(zip.files);
            const pdfNames = allFileNames.filter(n => n.toLowerCase().endsWith('.pdf'));
            const docxNames = allFileNames.filter(n => n.toLowerCase().endsWith('.docx'));

            filesData = [];

            // Pair pdf and docx by base name (most common pattern)
            for (const pdfName of pdfNames) {
                const base = pdfName.replace(/\.pdf$/i, '');
                const matchingDocx = docxNames.find(d => d.startsWith(base) && d.toLowerCase().endsWith('.docx'));

                const entry = {
                    name: base || pdfName,
                    pdfBlob: await zip.file(pdfName).async("blob"),
                    pdfUrl: null
                };

                entry.pdfBlob = new Blob([entry.pdfBlob], { type: "application/pdf" });
                entry.pdfUrl = URL.createObjectURL(entry.pdfBlob);

                if (matchingDocx) {
                    entry.docxBlob = await zip.file(matchingDocx).async("blob");
                    entry.docxBlob = new Blob([entry.docxBlob], { type: "application/vnd.openxmlformats-officedocument.wordprocessingml.document" });
                    entry.docxUrl = URL.createObjectURL(entry.docxBlob);
                    entry.name = base; // cleaner name
                }

                filesData.push(entry);
            }

            if (filesData.length === 0) {
                throw new Error("No PDF files found in the response");
            }

            currentIndex = 0;
            createFileList();
            updatePreview();
            resultSection.style.display = 'block';

        } catch (err) {
            console.error(err);
            previewContainer.innerHTML = `<div class="alert alert-danger m-3">${err.message || "Failed to process documents"}</div>`;
            resultSection.style.display = 'block';
        } finally {
            loader.style.display = 'none';
        }
    });

    // Navigation
    prevBtn.onclick = () => {
        if (currentIndex > 0) {
            currentIndex--;
            updatePreview();
        }
    };

    nextBtn.onclick = () => {
        if (currentIndex < filesData.length - 1) {
            currentIndex++;
            updatePreview();
        }
    };

    // Current file downloads
    downloadCurrentPdfBtn.onclick = () => {
        const f = filesData[currentIndex];
        if (!f?.pdfUrl) return alert("No PDF available");
        const a = document.createElement('a');
        a.href = f.pdfUrl;
        a.download = `${f.name}.pdf`;
        a.click();
    };

    downloadCurrentDocxBtn.onclick = () => {
        const f = filesData[currentIndex];
        if (!f?.docxUrl) return alert("No DOCX available for this file");
        const a = document.createElement('a');
        a.href = f.docxUrl;
        a.download = `${f.name}.docx`;
        a.click();
    };

downloadAllBtn.addEventListener('click', () => {
        if (!zipBlob) return alert("No files available");
        const a = document.createElement('a');
        a.href = URL.createObjectURL(zipBlob);
        a.download = "cipl_documents.zip";
        a.click();
    });

// Download current file's PDF + DOCX as mini-zip
downloadCurrentBothBtn.onclick = async () => {
    const f = filesData[currentIndex];
    if (!f || !f.pdfBlob) return alert("No PDF available for this file");

    const miniZip = new JSZip();

    // Always add PDF
    miniZip.file(`${f.name}.pdf`, f.pdfBlob);

    let hasDocx = false;

    // Add DOCX if it exists
    if (f.docxBlob) {
        miniZip.file(`${f.name}.docx`, f.docxBlob);
        hasDocx = true;
    }

    if (!hasDocx) {
        alert("No DOCX was generated for this file — only PDF will be included in the ZIP.");
    }

    try {
        const content = await miniZip.generateAsync({type: "blob"});
        const url = URL.createObjectURL(content);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${f.name}_both.zip`;
        a.click();

        setTimeout(() => URL.revokeObjectURL(url), 1000);
    } catch (err) {
        console.error("Failed to create current both ZIP:", err);
        alert("Failed to create ZIP for current file.");
    }
};

    function getCookie(name) {
        const value = `; ${document.cookie}`;
        const parts = value.split(`; ${name}=`);
        if (parts.length === 2) return parts.pop().split(';').shift();
        return null;
    }
</script>
