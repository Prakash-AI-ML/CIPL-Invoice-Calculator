<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CIPL Document Generator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/mammoth/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <style>
        body {
            background: linear-gradient(135deg, #1f4037, #99f2c8);
            min-height: 100vh;
        }
        .card-custom {
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .preview-container {
            height: 620px;
            overflow: hidden;
            background: white;
            border-radius: 10px;
            border: 1px solid #ccc;
        }
        .preview-container embed {
            width: 100%;
            height: 100%;
            border: none;
        }
        .file-list {
            max-height: 180px;
            overflow-y: auto;
        }
        .file-item {
            cursor: pointer;
        }
        .file-item.active {
            background: #e6f3ff;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-9">

            <div class="card card-custom p-4">

                <h3 class="text-center mb-4">📄 CIPL Document Generator</h3>

                <!-- Tabs -->
                <ul class="nav nav-tabs mb-4" id="ciplTabs" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" id="excel-tab" data-bs-toggle="tab" data-bs-target="#excel" type="button" role="tab" aria-controls="excel" aria-selected="true">
                            Excel Input
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="pdf-tab" data-bs-toggle="tab" data-bs-target="#pdf" type="button" role="tab" aria-controls="pdf" aria-selected="false">
                            PDF Input
                        </button>
                    </li>
                </ul>

                <div class="tab-content" id="ciplTabContent">

                    <!-- ─── Excel Tab ─────────────────────────────────────── -->
                    <div class="tab-pane fade show active" id="excel" role="tabpanel" aria-labelledby="excel-tab">
                        <form id="excelForm" class="excel-form">
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Upload Excel Files (.xls / .xlsx)</label>
                                <input type="file" class="form-control" id="excelFileInput" accept=".xls,.xlsx" multiple required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Divided By (optional)</label>
                                <input type="number" step="any" class="form-control" id="excelDividedBy">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Job Number (optional)</label>
                                <input type="string" step="any" class="form-control" id="excelJobNumber">
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary btn-lg">Generate from Excel</button>
                            </div>
                        </form>
                    </div>

                    <!-- ─── PDF Tab ───────────────────────────────────────── -->
                    <div class="tab-pane fade" id="pdf" role="tabpanel" aria-labelledby="pdf-tab">
                        <form id="pdfForm" class="pdf-form">
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Upload PDF Files</label>
                                <input type="file" class="form-control" id="pdfFileInput" accept=".pdf" multiple required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Divided By (optional)</label>
                                <input type="number" step="any" class="form-control" id="pdfDividedBy">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Job Number (optional)</label>
                                <input type="string" step="any" class="form-control" id="pdfJobNumber">
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary btn-lg">Generate from PDF</button>
                            </div>
                        </form>
                    </div>

                </div>

                <!-- Common result area (shown after any generation) -->
                <div class="text-center mt-4 loader" id="loader" style="display:none;">
                    <div class="spinner-border text-primary"></div>
                    <p class="mt-2">Generating documents... Please wait</p>
                </div>

                <div id="resultSection" class="mt-4" style="display:none;">
                    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
                        <h5 class="mb-0">Preview (PDF)</h5>
                        <div class="btn-group btn-group-sm">
                            <button id="prevBtn" class="btn btn-outline-secondary">← Prev</button>
                            <button id="nextBtn" class="btn btn-outline-secondary">Next →</button>
                        </div>
                    </div>

                    <div class="preview-container mb-3" id="previewContainer"></div>

                    <div class="mb-4">
                        <h6>Generated Files:</h6>
                        <div class="list-group file-list" id="fileList"></div>
                    </div>

                    <div class="d-flex gap-2 flex-wrap">
                        <button id="downloadCurrentPdfBtn" class="btn btn-success">⬇ Current PDF</button>
                        <button id="downloadCurrentDocxBtn" class="btn btn-primary">⬇ Current DOCX</button>
                        <button id="downloadCurrentBothBtn" class="btn btn-info">⬇ Current Both (ZIP)</button>
                        <button id="saveCurrentBtn" class="btn btn-outline-success">💾 Save Current</button>
                        <button id="downloadAllBtn" class="btn btn-warning">⬇ Download All (ZIP)</button>
                        <button id="saveAllBtn" class="btn btn-outline-primary">💾 Save All</button>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ────────────────────────────────────────────────
// Shared state
// ────────────────────────────────────────────────
let zipBlob = null;
let filesData = [];
let currentIndex = 0;


const loader = document.getElementById('loader');
const resultSection = document.getElementById('resultSection');
const previewContainer = document.getElementById('previewContainer');
const fileListEl = document.getElementById('fileList');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const downloadCurrentPdfBtn   = document.getElementById('downloadCurrentPdfBtn');
const downloadCurrentDocxBtn  = document.getElementById('downloadCurrentDocxBtn');
const downloadCurrentBothBtn  = document.getElementById('downloadCurrentBothBtn');
const downloadAllBtn          = document.getElementById('downloadAllBtn');

function revokeAllUrls() {
    filesData.forEach(f => {
        if (f.pdfUrl) URL.revokeObjectURL(f.pdfUrl);
        if (f.docxUrl) URL.revokeObjectURL(f.docxUrl);
    });
    filesData = [];
    currentIndex = 0;
}

function updatePreview() {
    if (filesData.length === 0) return;
    const file = filesData[currentIndex];
    previewContainer.innerHTML = file.pdfUrl
        ? `<embed src="${file.pdfUrl}" type="application/pdf">`
        : `<div class="alert alert-warning m-3">No PDF preview available</div>`;

    document.querySelectorAll('.file-item').forEach((el, i) => {
        el.classList.toggle('active', i === currentIndex);
    });

    prevBtn.disabled = currentIndex === 0;
    nextBtn.disabled = currentIndex === filesData.length - 1;
}

function createFileList() {
    fileListEl.innerHTML = '';
    filesData.forEach((file, index) => {
        const item = document.createElement('a');
        item.className = 'list-group-item list-group-item-action file-item';
        item.textContent = file.name || `Document ${index + 1}`;
        item.onclick = () => {
            currentIndex = index;
            updatePreview();
        };
        fileListEl.appendChild(item);
    });
}

async function processForm(formId, endpoint, acceptTypes) {
    const form = document.getElementById(formId);
    const fileInput = form.querySelector('input[type="file"]');
    const dividedInput = form.querySelector('input[type="number"]');
    const jobNumberInput = form.querySelector('input[type="string"]');

    const files = fileInput.files;
    if (files.length === 0) {
        alert(`Please select at least one file (${acceptTypes})`);
        return;
    }

    const dividedBy = dividedInput.value.trim();
    const jobNumber = jobNumberInput.value.trim();
    const token = localStorage.getItem("token") || getCookie("access_token") || "";
    const headers = { "Authorization": `Bearer ${token}` };
    if (dividedBy) headers["divided_by"] = dividedBy;

    loader.style.display = 'block';
    resultSection.style.display = 'none';
    previewContainer.innerHTML = '';
    revokeAllUrls();

    const formData = new FormData();
    Array.from(files).forEach((file, i) => formData.append(`file${i+1}`, file));

    try {
        const res = await fetch(`${API_BASE}${endpoint}`, {
            method: "POST",
            headers,
            body: formData
        });

        if (!res.ok) {
            let err = await res.text();
            throw new Error(`Server error ${res.status}: ${err}`);
        }

        zipBlob = await res.blob();
        const zip = await JSZip.loadAsync(zipBlob);
        // ── Add this block ────────────────────────────────────────
        let resultJson = null;
        const resultJsonFile = zip.file("results.json") || zip.file("results.JSON"); // case insensitive fallback

        if (resultJsonFile) {
            const jsonText = await resultJsonFile.async("string");
            try {
                resultJson = JSON.parse(jsonText);
                window.resultJson = resultJson;           // ← global access
                window.dividedByValue = dividedBy || null; // store dividedBy used for this batch
                window.jobNumberValue = jobNumber || null;
                
            } catch (e) {
                console.warn("Failed to parse results.json", e);
            }
        } else {
            console.warn("result.json not found in ZIP");
        }

        const allNames = Object.keys(zip.files);
        const pdfNames = allNames.filter(n => n.toLowerCase().endsWith('.pdf'));
        const docxNames = allNames.filter(n => n.toLowerCase().endsWith('.docx'));

        filesData = [];

        const fileMap = {};

        // Helper → get only filename
        function getFileName(path) {
            return path.split('/').pop();
        }

        // Helper → remove extension
        function getBaseName(filename) {
            return filename.replace(/\.(pdf|docx)$/i, '');
        }

        
        allNames.forEach(path => {
        const lower = path.toLowerCase();

        // 🚫 Ignore non-doc files (like result.json)
        if (!lower.endsWith('.pdf') && !lower.endsWith('.docx')) {
            return;
        }

        const filename = path.split('/').pop();
        if (!filename) return;

        const base = filename.replace(/\.(pdf|docx)$/i, '');

        if (!fileMap[base]) {
            fileMap[base] = { name: base };
        }

        if (lower.endsWith('.pdf')) {
            fileMap[base].pdfPath = path;
        }

        if (lower.endsWith('.docx')) {
            fileMap[base].docxPath = path;
        }
    });

        // Step 2: build blobs
        for (const base in fileMap) {
            const file = fileMap[base];
            const entry = { name: base };

            if (file.pdfPath) {
                const blob = await zip.file(file.pdfPath).async("blob");
                entry.pdfBlob = new Blob([blob], { type: "application/pdf" });
                entry.pdfUrl = URL.createObjectURL(entry.pdfBlob);
            }

            if (file.docxPath) {
                const blob = await zip.file(file.docxPath).async("blob");
                entry.docxBlob = new Blob([blob], {
                    type: "application/vnd.openxmlformats-officedocument.wordprocessingml.document"
                });
                entry.docxUrl = URL.createObjectURL(entry.docxBlob);
            }

            filesData.push(entry);
        }

        if (filesData.length === 0) {
            throw new Error("No PDF files found in the response");
        }

        currentIndex = 0;
        createFileList();
        updatePreview();
        resultSection.style.display = 'block';

    } catch (err) {
        console.error(err);
        previewContainer.innerHTML = `<div class="alert alert-danger m-3">${err.message || "Processing failed"}</div>`;
        resultSection.style.display = 'block';
    } finally {
        loader.style.display = 'none';
    }
}

// ─── Excel form submit ────────────────────────────────
document.getElementById('excelForm').addEventListener('submit', async e => {
    e.preventDefault();
    await processForm('excelForm', '/v1/cipl/docx', '.xls, .xlsx');
});

// ─── PDF form submit ──────────────────────────────────
document.getElementById('pdfForm').addEventListener('submit', async e => {
    e.preventDefault();
    await processForm('pdfForm', '/v1/cipl/pdf-docx', '.pdf');
});

// Navigation & download handlers (same as before)
prevBtn.onclick = () => { if (currentIndex > 0) { currentIndex--; updatePreview(); }};
nextBtn.onclick  = () => { if (currentIndex < filesData.length - 1) { currentIndex++; updatePreview(); }};

downloadCurrentPdfBtn.onclick = () => {
    const f = filesData[currentIndex];
    if (!f?.pdfUrl) return alert("No PDF available");
    const a = document.createElement('a');
    a.href = f.pdfUrl;
    a.download = `${f.name}.pdf`;
    a.click();
};

downloadCurrentDocxBtn.onclick = () => {
    const f = filesData[currentIndex];
    if (!f?.docxUrl) return alert("No DOCX available");
    const a = document.createElement('a');
    a.href = f.docxUrl;
    a.download = `${f.name}.docx`;
    a.click();
};

downloadCurrentBothBtn.onclick = async () => {
    const f = filesData[currentIndex];
    if (!f?.pdfBlob) return alert("No PDF available");

    const miniZip = new JSZip();
    miniZip.file(`${f.name}.pdf`, f.pdfBlob);
    let hasDocx = false;

    if (f.docxBlob) {
        miniZip.file(`${f.name}.docx`, f.docxBlob);
        hasDocx = true;
    }

    if (!hasDocx) {
        alert("No DOCX available — only PDF will be included.");
    }

    try {
        const content = await miniZip.generateAsync({type: "blob"});
        const url = URL.createObjectURL(content);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${f.name}_both.zip`;
        a.click();
        setTimeout(() => URL.revokeObjectURL(url), 1000);
    } catch (err) {
        alert("Failed to create ZIP");
    }
};

downloadAllBtn.addEventListener('click', () => {
    if (!zipBlob) return alert("No files available");
    const a = document.createElement('a');
    a.href = URL.createObjectURL(zipBlob);
    a.download = "cipl_documents.zip";
    a.click();
});

function getCookie(name) {
    const value = `; ${document.cookie}`;
    const parts = value.split(`; ${name}=`);
    if (parts.length === 2) return parts.pop()?.split(';')?.shift() ?? null;
    return null;
}
</script>

<script>
    // ────────────────────────────────────────────────
// Save functionality
// ────────────────────────────────────────────────

const saveCurrentBtn = document.getElementById('saveCurrentBtn');
const saveAllBtn      = document.getElementById('saveAllBtn');

async function saveInvoices(invoicesToSave) {
    if (!invoicesToSave || invoicesToSave.length === 0) {
        alert("No invoices available to save.");
        return;
    }

    const token = localStorage.getItem("token") || getCookie("access_token") || "";
    if (!token) {
        alert("Authentication token not found. Please log in again.");
        return;
    }

    const headers = {
        "Authorization": `Bearer ${token}`,
        "Content-Type": "application/json"
    };

    let successCount = 0;
    let failed = [];

    // Show loading feedback (you can enhance with better UI)
    saveAllBtn.disabled = true;
    saveCurrentBtn.disabled = true;
    saveAllBtn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Saving...';
    saveCurrentBtn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Saving...';

    for (const inv of invoicesToSave) {
        try {
            const res = await fetch(`${API_BASE}/v1/commercial-invoices/create`, {
                method: "POST",
                headers,
                body: JSON.stringify(inv)
            });

            if (!res.ok) {
                const errText = await res.text();
                throw new Error(`Save failed for ${inv.reference_number}: ${res.status} - ${errText}`);
            }

            successCount++;
            // Optional: await res.json() if you want to do something with response

        } catch (err) {
            console.error(err);
            failed.push(inv.reference_number);
        }
    }

    // Restore button state
    saveAllBtn.disabled = false;
    saveCurrentBtn.disabled = false;
    saveAllBtn.innerHTML = '💾 Save All Invoices';
    saveCurrentBtn.innerHTML = '💾 Save Current';

    if (successCount === invoicesToSave.length) {
        alert(`Successfully saved ${successCount} invoice(s)!`);
    } else {
        alert(`Saved ${successCount} of ${invoicesToSave.length} invoice(s).\nFailed: ${failed.join(", ")}`);
    }
}

// Helper: prepare payload for one reference (from result.json structure)
function prepareInvoicePayload(key, value, dividedBy, jobNumber, groupNumber) {
    const isOriginal = !dividedBy;  // true if no dividedBy (or 0/falsy)

    return {
        reference_number: isOriginal 
            ? `${key}-ORI`
            : `${key}-FNL`,
        job_number:jobNumber,
        group_number: groupNumber,
        jsondata: value,               // the whole object (shipper, items, totals, etc.)
        is_original: isOriginal,
        divided_by: isOriginal ? null : Number(dividedBy) || 0
    };
}

// ─── Save Current ─────────────────────────────────────
saveCurrentBtn.addEventListener('click', () => {
    if (filesData.length === 0 || currentIndex >= filesData.length) {
        alert("No document selected.");
        return;
    }

    const currentFile = filesData[currentIndex];
    const refKey = currentFile.name.replace(/^CIPL_/, '');  // e.g. "ES-00116"
    const group_number = Object.keys(window.resultJson).join(',');
    
    // console.log(window.jobNumberValue)

    // We need the original JSON data — but frontend only has ZIP filenames
    // Assumption: you must have parsed result.json earlier or received it separately
    // For now — we'll assume you have a global `resultJson` object (see next step)

    if (!window.resultJson || !window.resultJson[refKey]) {
        alert("Invoice data not available for this reference. Cannot save.");
        return;
    }

    const payload = prepareInvoicePayload(refKey, window.resultJson[refKey], window.dividedByValue, window.jobNumberValue, group_number);

    saveInvoices([payload]);
});

// ─── Save All ─────────────────────────────────────────
saveAllBtn.addEventListener('click', () => {
    if (filesData.length === 0) {
        alert("No documents available.");
        return;
    }

    if (!window.resultJson) {
        alert("Invoice data (result.json) not loaded. Cannot save.");
        return;
    }

    const dividedBy = window.dividedByValue; // from form input or stored
    const group_number = Object.keys(window.resultJson).join(',');

    const payloads = Object.keys(window.resultJson).map(key => {
        return prepareInvoicePayload(key, window.resultJson[key], dividedBy, window.jobNumberValue, group_number);
    });

    saveInvoices(payloads);
});
</script>

</body>
</html>
