{% extends "base.html" %}
{% block title %}Dashboard{% endblock %}

{% block content %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SOA Dashboard</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    .tab-content { padding: 20px;}
    .overdue-1-30   { background-color: #fff3cd; color: #856404; } /* Light Yellow */
    .overdue-31-60  { background-color: #ffeaa7; }
    .overdue-61-90  { background-color: #fdcb6e; }
    .overdue-91-120 { background-color: #e17055; color: white; }
    .overdue-121-150{ background-color: #d63031; color: white; }
    .overdue-150    { background-color: #8b0000; color: white; } /* Dark Red */
    .current-due    { background-color: #d4edda; color: #155724; font-weight: bold; }
    .zero           { text-align: center; }
    .table th { background-color: #f8f9fa; }
    /* Sticky Filters Section */
    #aging{
    position: relative;
    }
#filterCard {
    position: sticky;
    top: 0;
    z-index: 1050; 
    
}
#summaryBadges {
    position: sticky;
    top: 250px;
    z-index: 1050; 
    
}

#agingTablediv .table-responsive {
    max-height: 440px;        /* Choose your scroll height */
    overflow-y: auto;
}

#agingTable thead th {
    position: sticky;
    top: 0;
    background: white;        /* Needed so text is readable */
    z-index: 1050;            /* Keep above table body */
}
.modal-body .table-responsive {
    max-height: 500px;   /* Choose your scroll height */
    overflow-y: auto;      /* Ensure table can scroll */
}

.modal-body thead th {
    position: sticky;
    top: 0;
    background: white;     /* required */
    z-index: 1050;         /* above table rows */
}

/* Optional: sticky first column */
/* #agingTable th:first-child,
#agingTable td:first-child {
    position: sticky;
    left: 0;
    background: white;
    z-index: 1050;
} */


.nav-link.active {
    color:  #0d6efd !important;
  
}

.nav-link {
    color: black;
   
}



  </style>
</head>

<body class="bg-light">

<div class="container-fluid py-4">
  <h2 class="text-center">SOA Dashboard</h2>

  <!-- Tabs -->
  <ul class="nav nav-tabs mb-4" id="myTab" role="tablist">
    <li class="nav-item" role="presentation">
      <button class="nav-link" id="extract-tab" data-bs-toggle="tab" data-bs-target="#extract" type="button">Extract</button>
    </li>
    <li class="nav-item" role="presentation">
      <button class="nav-link active" id="aging-tab" data-bs-toggle="tab" data-bs-target="#aging" type="button">Payment Aging</button>
    </li>
    <li class="nav-item" role="presentation">
      <button class="nav-link" id="advice-tab" data-bs-toggle="tab" data-bs-target="#advice" type="button">Payment Advice</button>
    </li>
     <li class="nav-item" role="presentation">
      <button class="nav-link" id="client-tab" data-bs-toggle="tab" data-bs-target="#client" type="button">Clients List</button>
    </li>
  </ul>

  <div class="tab-content bg-white shadow-sm rounded" id="myTabContent">

    <!-- Extract Tab (Empty for now) -->
    <!-- <div class="tab-pane fade" id="extract" role="tabpanel">
      <p>Extract feature coming soon...</p>
    </div> -->


      <!-- Client List Tab -->
    <div class="tab-pane fade" id="client" role="tabpanel">
      <h4>Customers with Current Due Amount</h4>
      <div class="table-responsive">
        <table class="table table-bordered table-hover" id="clientTable">
          <thead class="table-light">
            <tr>
              <th>Customer ID</th>
              <th>Customer Name</th>
              <th>Paid Invoices</th>
              <th>Unpaid Invoices</th>
              <th>Total Invoices</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      <div id="clientLoading" class="text-center py-5">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="mt-2">Loading client data...</p>
      </div>
      <div id="clientError" class="alert alert-danger d-none"></div>
    </div>


  </div>
</div>


<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<
<!-- Load home.js correctly -->
<script src="{{ url_for('static', path='/js/home.js') }}"></script>

<!-- Inline event setup (runs after home.js loads) -->
<script>
  console.log('Inline script: Setting up tab events');
  // Load on tab shown (Bootstrap event)
  const clientTab = document.querySelector('[data-bs-target="#client"]');
  if (clientTab) {
    clientTab.addEventListener('shown.bs.tab', () => {
      console.log('Client tab shown - loading data');
      loadClientSummary();
    });
  }
  // Also on click for immediate trigger
  // document.getElementById('client-tab')?.addEventListener('click', loadClientSummary);
  // document.getElementById('advice-tab')?.addEventListener('click', loadClientSummary);
</script>

</body>
</html>

{% endblock %}
